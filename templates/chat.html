<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <a href="/home" class="back-btn">← Messages</a>

    <div class="chat-header">
        <img src="{{ other.avatar }}" class="header-avatar">
        <span class="header-name">{{ other.username }}</span>
    </div>

    <div id="chat" class="chat-box">
        {% for m in messages %}
        <div class="bubble {{ 'me' if m.user == username else 'other' }}">
            <b>{{ m.user }}</b><br>
            {{ m.text }}
            <span>{{ m.timestamp }}</span>
        </div>
        {% endfor %}
    </div>

    <div id="typing" class="typing"></div>

    <div class="input-bar">
        <input id="msg" oninput="typing()" placeholder="Message...">
        <button onclick="send()">Send</button>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        const socket = io({
            query: { username: "{{ username }}" }
        });

        const CHAT_ID = "{{ chat_id }}";

        socket.on("connect", () => {
            if (CHAT_ID) socket.emit("join_chat", CHAT_ID);
        });

        socket.on("chat_message", data => {
            const div = document.createElement("div");
            div.className = "bubble " + (data.user === "{{ username }}" ? "me" : "other");
            div.innerHTML = `
                <b>${data.user}</b><br>
                ${data.text}
                <span>${data.time}</span>
            `;
            const chatBox = document.getElementById("chat");
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        socket.on("typing", user => {
            const el = document.getElementById("typing");
            el.innerText = `${user} is typing...`;
            setTimeout(() => el.innerText = "", 1000);
        });

        function send() {
            const input = document.getElementById("msg");
            if (!input.value.trim() || !CHAT_ID) return;

            socket.emit("chat_message", {
                chat_id: CHAT_ID,
                text: input.value
            });

            input.value = "";
        }

        function typing() {
            socket.emit("typing");
        }
    </script>

</body>
</html>
