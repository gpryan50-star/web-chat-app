<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>Messages</h2>

        <!-- Start New Chat -->
        <form action="/new_chat" method="POST" class="new-chat">
            <input name="username" placeholder="Start chat with username" required>
            <button type="submit">Start</button>
        </form>

        <hr>

        {% if chats %}

            {% for chat in chats %}

                <a class="chat-item" href="/chat/{{ chat.id }}">
                    <div class="chat-info">
                        <p>Chat {{ chat.id }}</p>
                    </div>
                </a>

            {% endfor %}

        {% else %}

            <p>No conversations yet.</p>

        {% endif %}

        <a href="/home" class="back-home">← Back Home</a>

    </div>



    <!-- Chat Window -->
    <div class="chat-window">

        {% if chat_id %}

        <!-- Messages -->
        <div class="messages" id="messages">

            {% for msg in messages %}

                <div class="message {{ 'me' if msg.user == current_user.username else 'them' }}">
                    <p>{{ msg.text }}</p>
                </div>

            {% endfor %}

        </div>



        <!-- Message Input -->
        <form id="message-form">

            <input
                id="message-input"
                type="text"
                placeholder="Type a message..."
                autocomplete="off"
            >

            <button type="submit">Send</button>

        </form>



<script>

const socket = io({
    query: {
        username: "{{ current_user.username }}"
    }
});

const chatId = "{{ chat_id }}";

socket.emit("join_chat", chatId);



document.getElementById("message-form").addEventListener("submit", function(e){

    e.preventDefault();

    const input = document.getElementById("message-input");

    const text = input.value.trim();

    if(text === "") return;


    socket.emit("chat_message", {

        chat_id: chatId,
        text: text

    });

    input.value = "";

});



socket.on("chat_message", function(data){

    const messagesDiv = document.getElementById("messages");

    const div = document.createElement("div");


    if(data.user === "{{ current_user.username }}"){

        div.className = "message me";

    } else {

        div.className = "message them";

    }


    div.innerHTML = "<p>" + data.text + "</p>";

    messagesDiv.appendChild(div);

    messagesDiv.scrollTop = messagesDiv.scrollHeight;

});

</script>



        {% else %}

        <!-- Empty State -->
        <div class="empty-chat">

            <h2>Select a conversation</h2>

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
